<script type="text/babel">
const { useState, useEffect } = React;

const questions = [
  {
    q: "\u0645\u0627 \u0647\u0648 \u062a\u0639\u0631\u064a\u0641 \u0627\u0644\u0645\u0636\u064a\u0641 \u0628\u0635\u0641\u0629 \u0639\u0627\u0645\u0629\u061f",
    options: ["\u0627\u0644\u0634\u062e\u0635 \u0627\u0644\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0625\u0639\u062f\u0627\u062f \u0627\u0644\u0637\u0639\u0627\u0645 \u0641\u064a \u0627\u0644\u0645\u0637\u0628\u062e","\u0627\u0644\u0630\u064a \u064a\u0639\u0645\u0644 \u0641\u064a \u0627\u0644\u0645\u0642\u0627\u0647\u064a \u0623\u0648 \u0627\u0644\u0645\u0637\u0627\u0639\u0645 \u0623\u0648 \u0627\u0644\u0641\u0646\u0627\u062f\u0642 \u0644\u062e\u062f\u0645\u0629 \u0627\u0644\u0632\u0628\u0627\u0626\u0646 \u0645\u0646 \u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0648\u0627\u0644\u0645\u0623\u0643\u0648\u0644\u0627\u062a \u0648\u0631\u0641\u0639 \u0627\u0644\u0623\u0637\u0628\u0627\u0642 \u0648\u062a\u0646\u0638\u064a\u0645 \u0627\u0644\u0637\u0627\u0648\u0644\u0629","\u0645\u062f\u064a\u0631 \u0627\u0644\u0645\u0637\u0639\u0645 \u0627\u0644\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0627\u0644\u0625\u062f\u0627\u0631\u0629 \u0641\u0642\u0637","\u0627\u0644\u0634\u062e\u0635 \u0627\u0644\u0630\u064a \u064a\u0633\u062a\u0642\u0628\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0639\u0646\u062f \u0627\u0644\u0645\u062f\u062e\u0644 \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u0627\u0644\u0645\u0636\u064a\u0641 \u0647\u0648 \u0627\u0644\u0634\u062e\u0635 \u0627\u0644\u0630\u064a \u064a\u0639\u0645\u0644 \u0641\u064a \u0627\u0644\u0645\u0642\u0627\u0647\u064a \u0623\u0648 \u0627\u0644\u0645\u0637\u0627\u0639\u0645 \u0623\u0648 \u0627\u0644\u0641\u0646\u0627\u062f\u0642 \u0644\u062e\u062f\u0645\u0629 \u0627\u0644\u0632\u0628\u0627\u0626\u0646 \u0645\u0646 \u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0648\u0627\u0644\u0645\u0623\u0643\u0648\u0644\u0627\u062a \u0648\u0631\u0641\u0639 \u0627\u0644\u0623\u0637\u0628\u0627\u0642 \u0648\u062a\u0646\u0638\u064a\u0645 \u0627\u0644\u0637\u0627\u0648\u0644\u0629\u060c \u0648\u0644\u0644\u0645\u0636\u064a\u0641 \u0645\u0648\u0627\u0635\u0641\u0627\u062a \u062e\u0627\u0635\u0629 \u062a\u062c\u0639\u0644\u0647 \u0630\u0648 \u0645\u0647\u0627\u0631\u0629 \u0648\u0627\u062a\u0642\u0627\u0646 \u0641\u064a \u0627\u0644\u0639\u0645\u0644.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0627\u0644\u0645\u0636\u064a\u0641",
  },
  {
    q: "\u0643\u0645 \u0645\u0631\u0629 \u064a\u062c\u0628 \u0639\u0644\u0649 \u0627\u0644\u0645\u0636\u064a\u0641 \u0627\u0644\u0627\u0633\u062a\u062d\u0645\u0627\u0645 \u064a\u0648\u0645\u064a\u0627\u064b\u061f",
    options: ["\u0645\u0631\u0629 \u0648\u0627\u062d\u062f\u0629 \u0641\u064a \u0627\u0644\u0635\u0628\u0627\u062d \u0641\u0642\u0637","\u062b\u0644\u0627\u062b \u0645\u0631\u0627\u062a \u064a\u0648\u0645\u064a\u0627\u064b","\u0645\u0631\u062a\u064a\u0646: \u0642\u0628\u0644 \u0628\u062f\u0627\u064a\u0629 \u0627\u0644\u0639\u0645\u0644 \u0648\u0628\u0639\u062f \u0646\u0647\u0627\u064a\u062a\u0647","\u0639\u0646\u062f \u0627\u0644\u062d\u0627\u062c\u0629 \u0641\u0642\u0637"],
    answer: 2,
    explanation: "\u0645\u0646 \u0627\u0644\u0636\u0631\u0648\u0631\u064a \u0627\u0644\u0627\u0633\u062a\u062d\u0645\u0627\u0645 \u0645\u0631\u062a\u064a\u0646 \u0641\u064a \u0627\u0644\u064a\u0648\u0645: \u0642\u0628\u0644 \u0628\u062f\u0627\u064a\u0629 \u0627\u0644\u0639\u0645\u0644 \u0648\u0627\u0644\u062b\u0627\u0646\u064a\u0629 \u0628\u0639\u062f \u0646\u0647\u0627\u064a\u062a\u0647\u060c \u0648\u0641\u064a \u0643\u0644\u062a\u0627 \u0627\u0644\u062d\u0627\u0644\u062a\u064a\u0646 \u064a\u062a\u0645 \u062a\u063a\u064a\u064a\u0631 \u0627\u0644\u0645\u0644\u0627\u0628\u0633 \u0627\u0644\u062f\u0627\u062e\u0644\u064a\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0627\u0644\u0645\u0636\u064a\u0641",
  },
  {
    q: "\u0645\u0627 \u0627\u0644\u0634\u0631\u0637 \u0627\u0644\u0645\u062a\u0639\u0644\u0642 \u0628\u0623\u0638\u0627\u0641\u0631 \u0627\u0644\u0645\u0636\u064a\u0641 \u0648\u0628\u062f\u064a\u0647\u061f",
    options: ["\u064a\u062c\u0628 \u0623\u0646 \u062a\u0643\u0648\u0646 \u0627\u0644\u0623\u0638\u0627\u0641\u0631 \u0637\u0648\u064a\u0644\u0629 \u0648\u0645\u0632\u064a\u0646\u0629","\u064a\u062c\u0628 \u0623\u0646 \u062a\u0643\u0648\u0646 \u0627\u0644\u0623\u0638\u0627\u0641\u0631 \u0645\u0642\u0635\u0648\u0635\u0629 \u0648\u0646\u0638\u064a\u0641\u0629 \u0648\u062a\u064f\u0646\u0633\u0644 \u0627\u0644\u064a\u062f\u064a\u0646 \u0642\u0628\u0644 \u0628\u062f\u0627\u064a\u0629 \u0627\u0644\u062e\u062f\u0645\u0629 \u0648\u0628\u0639\u0646\u0627\u064a\u062a\u0647\u0627","\u0644\u0627 \u064a\u0648\u062c\u062f \u0634\u0631\u0637 \u062e\u0627\u0635 \u0628\u0627\u0644\u0623\u0638\u0627\u0641\u0631","\u064a\u064f\u0633\u0645\u062d \u0628\u0627\u0633\u062a\u062e\u062f\u0627\u0645 \u0637\u0644\u0627\u0621 \u0627\u0644\u0623\u0638\u0627\u0641\u0631 \u0627\u0644\u0645\u0644\u0648\u0646"],
    answer: 1,
    explanation: "\u0627\u0644\u0623\u0638\u0627\u0641\u0631 \u0648\u0627\u0644\u0628\u062f\u064a\u0646 \u064a\u062c\u0628 \u0623\u0646 \u062a\u0643\u0648\u0646 \u0645\u0642\u0635\u0648\u0635\u0629 \u0648\u0646\u0638\u064a\u0641\u0629 \u0648\u062a\u064f\u0646\u0633\u0644 \u0627\u0644\u064a\u062f\u064a\u0646 \u0642\u0628\u0644 \u0628\u062f\u0627\u064a\u0629 \u0627\u0644\u062e\u062f\u0645\u0629 \u0648\u0628\u0639\u0627\u064a\u062a\u0647\u0627\u060c \u0648\u0647\u0630\u0627 \u0636\u0631\u0648\u0631\u064a \u0644\u0644\u0646\u0638\u0627\u0641\u0629 \u0639\u0646\u062f \u0627\u0644\u062a\u0639\u0627\u0645\u0644 \u0645\u0639 \u0627\u0644\u0623\u0637\u0639\u0645\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0627\u0644\u0645\u0636\u064a\u0641",
  },
  {
    q: "\u0645\u0627 \u0647\u0648 \u0627\u0644\u062d\u0630\u0627\u0621 \u0627\u0644\u0645\u0646\u0627\u0633\u0628 \u0644\u0644\u0645\u0636\u064a\u0641\u061f",
    options: ["\u062d\u0630\u0627\u0621 \u0631\u064a\u0627\u0636\u064a \u0644\u0644\u0631\u0627\u062d\u0629","\u062d\u0630\u0627\u0621 \u0639\u0627\u0644\u064a \u0627\u0644\u0643\u0639\u0628 \u0644\u0625\u0638\u0647\u0627\u0631 \u0627\u0644\u0623\u0646\u0627\u0642\u0629","\u0623\u064a \u062d\u0630\u0627\u0621 \u0645\u062a\u0648\u0641\u0631","\u062d\u0630\u0627\u0621 \u0645\u0631\u064a\u062d \u0644\u0643\u064a \u0644\u0627 \u064a\u0624\u062b\u0631 \u0639\u0644\u0649 \u0627\u0644\u0645\u0636\u064a\u0641 \u0623\u062b\u0646\u0627\u0621 \u0627\u0644\u0639\u0645\u0644 \u0645\u0639 \u0645\u0631\u0627\u0639\u0627\u0629 \u062a\u063a\u064a\u064a\u0631\u0647 \u064a\u0648\u0645\u064a\u0627\u064b"],
    answer: 3,
    explanation: "\u0627\u0644\u0642\u062f\u0645 \u062a\u062d\u062a\u0627\u062c \u0625\u0644\u0649 \u0639\u0646\u0627\u064a\u0629 \u0645\u0631\u0643\u0632\u0629 \u0648\u0646\u0638\u0627\u0641\u0629 \u0634\u062f\u064a\u062f\u0629 \u0648\u064a\u062c\u0628 \u0623\u0646 \u064a\u0643\u0648\u0646 \u0627\u0644\u062d\u0630\u0627\u0621 \u0645\u0631\u064a\u062d\u0627\u064b \u0644\u0643\u064a \u0644\u0627 \u064a\u0624\u062b\u0631 \u0639\u0644\u0649 \u0627\u0644\u0645\u0636\u064a\u0641 \u0623\u062b\u0646\u0627\u0621 \u0627\u0644\u0639\u0645\u0644 \u0645\u0639 \u0645\u0631\u0627\u0639\u0627\u0629 \u062a\u063a\u064a\u064a\u0631 \u0627\u0644\u062d\u0630\u0627\u0621 \u0627\u0644\u0635\u0627\u0644\u062d \u0644\u0644\u0627\u0633\u062a\u0639\u0645\u0627\u0644 \u064a\u0648\u0645\u064a\u0627\u064b.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0627\u0644\u0645\u0636\u064a\u0641",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0645\u0633\u0624\u0648\u0644\u064a\u0629 \u0643\u0627\u0628\u062a\u0646 \u0627\u0644\u0642\u0633\u0645 \u0641\u064a \u0627\u0644\u0645\u0637\u0639\u0645\u061f",
    options: ["\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0646\u0638\u0627\u0641\u0629 \u0627\u0644\u0645\u0637\u0628\u062e \u0641\u0642\u0637","\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0625\u0639\u062f\u0627\u062f \u0627\u0644\u0637\u0639\u0627\u0645 \u0628\u0627\u0644\u0645\u0637\u0628\u062e","\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0642\u0633\u0645 \u0645\u0639\u064a\u0646 \u0641\u064a \u0627\u0644\u0635\u0627\u0644\u0629 \u0648\u064a\u0634\u0631\u0641 \u0639\u0644\u0649 \u0627\u0644\u062c\u0644\u0648\u0633 \u0648\u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0637\u0644\u0628\u0627\u062a \u0648\u062a\u0628\u0644\u064a\u063a\u0647\u0627 \u0644\u0645\u0633\u0624\u0648\u0644 \u0627\u0644\u0645\u0637\u0639\u0645 \u0648\u0623\u062e\u0630 \u0627\u0644\u062d\u062c\u0648\u0632\u0627\u062a \u0648\u062a\u0633\u062c\u064a\u0644\u0647\u0627","\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0627\u0644\u062d\u062c\u0648\u0632\u0627\u062a \u0627\u0644\u0647\u0627\u062a\u0641\u064a\u0629 \u0641\u0642\u0637"],
    answer: 2,
    explanation: "\u0643\u0627\u0628\u062a\u0646 \u0627\u0644\u0642\u0633\u0645 \u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0642\u0633\u0645 \u0645\u0639\u064a\u0646 \u0641\u064a \u0627\u0644\u0635\u0627\u0644\u0629 \u0643\u0645\u0627 \u064a\u0634\u0631\u0641 \u0639\u0644\u0649 \u0627\u0644\u062c\u0644\u0648\u0633 \u0648\u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0637\u0644\u0628\u0627\u062a \u0648\u062a\u0628\u0644\u064a\u063a\u0647\u0627 \u0644\u0645\u0633\u0624\u0648\u0644 \u0627\u0644\u0645\u0637\u0639\u0645\u060c \u0648\u0647\u0648 \u064a\u0633\u062a\u0642\u0628\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0648\u064a\u0645\u0643\u0646\u0647 \u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628\u0627\u062a \u0648\u062a\u0628\u0644\u064a\u063a\u0647\u0627 \u0641\u064a \u062f\u0641\u062a\u0631 \u0627\u0644\u062d\u062c\u0648\u0632\u0627\u062a.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0648\u0638\u0627\u0626\u0641 \u0627\u0644\u0645\u0637\u0639\u0645",
  },
  {
    q: "\u0645\u0646 \u0647\u0648 \u0645\u062f\u064a\u0631 \u0627\u0644\u0645\u0637\u0639\u0645 \u0648\u0645\u0627 \u062f\u0648\u0631\u0647 \u0627\u0644\u0623\u0633\u0627\u0633\u064a\u061f",
    options: ["\u064a\u0639\u0645\u0644 \u0639\u0644\u0649 \u0627\u0644\u0637\u0627\u0648\u0644\u0627\u062a \u0648\u064a\u062e\u062f\u0645 \u0627\u0644\u0636\u064a\u0648\u0641 \u0645\u0628\u0627\u0634\u0631\u0629","\u0647\u0648 \u0627\u0644\u0645\u0633\u0624\u0648\u0644 \u0627\u0644\u0623\u0648\u0644 \u0627\u0644\u0628\u0627\u0634\u0631 \u0639\u0646 \u0643\u0644 \u0645\u0646 \u064a\u0639\u0645\u0644 \u062f\u0627\u062e\u0644 \u0627\u0644\u0645\u0637\u0639\u0645 \u0648\u062e\u0627\u0631\u062c\u0647\u060c \u0648\u064a\u0642\u0648\u0645 \u0628\u0627\u0644\u0625\u0634\u0631\u0627\u0641 \u0648\u0627\u0644\u062a\u0633\u064a\u064a\u0631 \u0648\u0627\u0644\u0623\u0633\u0639\u0627\u0631 \u0648\u0633\u0646\u0648\u064a\u0629 \u0627\u0644\u0648\u062c\u0628\u0627\u062a \u0648\u0627\u0644\u062a\u0643\u0627\u0644\u064a\u0641","\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0627\u0644\u0645\u0637\u0628\u062e \u0648\u0625\u0639\u062f\u0627\u062f \u0627\u0644\u0637\u0639\u0627\u0645 \u0641\u0642\u0637","\u064a\u0633\u062a\u0642\u0628\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0641\u0642\u0637 \u0639\u0646\u062f \u0627\u0644\u0645\u062f\u062e\u0644"],
    answer: 1,
    explanation: "\u0645\u062f\u064a\u0631 \u0627\u0644\u0645\u0637\u0639\u0645 \u0647\u0648 \u0627\u0644\u0645\u0633\u0624\u0648\u0644 \u0627\u0644\u0623\u0648\u0644 \u0627\u0644\u0628\u0627\u0634\u0631 \u0639\u0646 \u0643\u0644 \u0645\u0646 \u064a\u0639\u0645\u0644 \u062f\u0627\u062e\u0644 \u0627\u0644\u0645\u0637\u0639\u0645 \u0648\u062e\u0627\u0631\u062c\u0647\u060c \u0648\u064a\u0642\u0648\u0645 \u0628\u0627\u0644\u0625\u0634\u0631\u0627\u0641 \u0639\u0644\u0649 \u0627\u0644\u0625\u062f\u0627\u0631\u0629 \u0648\u0627\u0644\u062a\u0633\u064a\u064a\u0631 \u062f\u0627\u062e\u0644 \u0627\u0644\u0645\u0637\u0639\u0645 \u0648\u0627\u0644\u0623\u0633\u0639\u0627\u0631 \u0648\u0633\u0646\u0648\u064a\u0629 \u0627\u0644\u0648\u062c\u0628\u0627\u062a \u0648\u0645\u0631\u0627\u0642\u0628\u0629 \u0627\u0644\u062a\u0643\u0627\u0644\u064a\u0641.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0648\u0638\u0627\u0626\u0641 \u0627\u0644\u0645\u0637\u0639\u0645",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0645\u0637\u0627\u0639\u0645 \u0627\u0644\u0648\u0627\u0631\u062f\u0629 \u0641\u064a \u0627\u0644\u0643\u062a\u0627\u0628\u061f",
    options: ["\u0645\u0637\u0627\u0639\u0645 \u0641\u0627\u062e\u0631\u0629 \u0648\u0645\u0637\u0627\u0639\u0645 \u0634\u0639\u0628\u064a\u0629 \u0641\u0642\u0637","\u0645\u0637\u0627\u0639\u0645 \u062a\u0642\u0644\u064a\u062f\u064a\u0629\u060c \u0645\u0637\u0627\u0639\u0645 \u0633\u0631\u064a\u0639\u0629\u060c \u0645\u0637\u0627\u0639\u0645 \u062e\u062f\u0645\u0629 \u0630\u0627\u062a\u064a\u0629\u060c \u0645\u0637\u0627\u0639\u0645 \u0627\u062e\u062f\u0645 \u0646\u0641\u0633\u0643 \u0628\u0646\u0641\u0633\u0643\u060c \u0645\u0637\u0627\u0639\u0645 \u0643\u0648\u0641\u064a \u0634\u0648\u0628","\u0645\u0637\u0627\u0639\u0645 \u0645\u062d\u0644\u064a\u0629 \u0648\u0645\u0637\u0627\u0639\u0645 \u062f\u0648\u0644\u064a\u0629 \u0641\u0642\u0637","\u0645\u0637\u0627\u0639\u0645 \u0645\u0641\u062a\u0648\u062d\u0629 \u0648\u0645\u0637\u0627\u0639\u0645 \u0645\u063a\u0644\u0642\u0629"],
    answer: 1,
    explanation: "\u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0645\u0637\u0627\u0639\u0645 \u0647\u064a: \u0645\u0637\u0627\u0639\u0645 \u062a\u0642\u0644\u064a\u062f\u064a\u0629\u060c \u0645\u0637\u0627\u0639\u0645 \u0633\u0631\u064a\u0639\u0629\u060c \u0645\u0637\u0627\u0639\u0645 \u062e\u062f\u0645\u0629 \u0630\u0627\u062a\u064a\u0629\u060c \u0645\u0637\u0627\u0639\u0645 \u0627\u062e\u062f\u0645 \u0646\u0641\u0633\u0643 \u0628\u0646\u0641\u0633\u0643\u060c \u0648\u0645\u0637\u0627\u0639\u0645 \u0643\u0648\u0641\u064a \u0634\u0648\u0628.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0645\u0637\u0627\u0639\u0645",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0627\u0644\u0648\u0627\u062c\u0628\u0627\u062a \u0627\u0644\u064a\u0648\u0645\u064a\u0629 \u0627\u0644\u0623\u0648\u0644\u0649 \u0644\u0644\u0645\u0636\u064a\u0641 \u0642\u0628\u0644 \u0628\u062f\u0621 \u0627\u0644\u0639\u0645\u0644\u061f",
    options: ["\u062a\u062c\u0647\u064a\u0632 \u0627\u0644\u0637\u0644\u0628\u0627\u062a \u0648\u062a\u0648\u0632\u064a\u0639\u0647\u0627","\u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0641\u0648\u0631 \u0648\u0635\u0648\u0644\u0647\u0645","\u0623\u0646 \u064a\u0643\u0648\u0646 \u062c\u0627\u0647\u0632\u0627\u064b \u0641\u064a \u0645\u0643\u0627\u0646 \u0639\u0645\u0644\u0647 \u0642\u0628\u0644 \u0648\u0642\u062a \u0643\u0627\u0641\u064d \u0648\u0623\u0646 \u064a\u0644\u0628\u0633 \u0628\u0627\u0644\u0645\u0638\u0647\u0631 \u0627\u0644\u0644\u0627\u0626\u0642 \u0648\u0627\u0644\u0628\u062f\u0644\u0629 \u0627\u0644\u0631\u0633\u0645\u064a\u0629 \u0644\u0644\u0639\u0645\u0644","\u062a\u0646\u0627\u0648\u0644 \u0648\u062c\u0628\u0629 \u062e\u0641\u064a\u0641\u0629 \u0642\u0628\u0644 \u0627\u0644\u0639\u0645\u0644"],
    answer: 2,
    explanation: "\u0645\u0646 \u0627\u0644\u0648\u0627\u062c\u0628\u0627\u062a \u0627\u0644\u064a\u0648\u0645\u064a\u0629 \u0644\u0644\u0645\u0636\u064a\u0641: \u0623\u0646 \u064a\u0643\u0648\u0646 \u062c\u0627\u0647\u0632\u0627\u064b \u0641\u064a \u0645\u0643\u0627\u0646 \u0639\u0645\u0644\u0647 \u0642\u0628\u0644 \u0648\u0642\u062a \u0643\u0627\u0641\u064d\u060c \u0648\u0623\u0646 \u064a\u0644\u0628\u0633 \u0628\u0627\u0644\u0645\u0638\u0647\u0631 \u0627\u0644\u0644\u0627\u0626\u0642 \u0648\u0627\u0644\u0628\u062f\u0644\u0629 \u0627\u0644\u0631\u0633\u0645\u064a\u0629 \u0644\u0644\u0639\u0645\u0644.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0627\u0644\u0648\u0627\u062c\u0628\u0627\u062a \u0627\u0644\u064a\u0648\u0645\u064a\u0629",
  },
  {
    q: "\u0645\u0627 \u0647\u0648 \u062f\u0648\u0631 \u0627\u0644\u0648\u064a\u062a\u0631 (\u0627\u0644\u0645\u0636\u064a\u0641 \u0627\u0644\u0628\u0627\u0634\u0631)\u061f",
    options: ["\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0627\u0644\u0645\u0637\u0628\u062e \u0648\u0625\u0639\u062f\u0627\u062f \u0627\u0644\u0637\u0639\u0627\u0645","\u064a\u0639\u0645\u0644 \u0641\u064a \u0627\u0644\u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0641\u0642\u0637","\u0647\u0648 \u0627\u0644\u0645\u0633\u0627\u0639\u062f \u0627\u0644\u0628\u0627\u0634\u0631 \u0644\u0648\u064a\u062a\u0631 \u0627\u0644\u0642\u0633\u0645 \u064a\u0642\u0648\u0645 \u0628\u062c\u0645\u064a\u0639 \u0627\u0644\u0623\u0639\u0645\u0627\u0644 \u0645\u0646 \u062a\u062c\u0647\u064a\u0632 \u0627\u0644\u0645\u0643\u0627\u0646 \u0648\u0631\u0641\u0639 \u0627\u0644\u0623\u0637\u0628\u0627\u0642 \u0627\u0644\u0641\u0627\u0631\u063a\u0629 \u0648\u0646\u0638\u0627\u0641\u0629 \u0627\u0644\u0637\u0627\u0648\u0644\u0629 \u0648\u062a\u0631\u062a\u064a\u0628\u0647\u0627","\u0645\u0633\u0624\u0648\u0644 \u0639\u0646 \u0627\u0644\u062d\u062c\u0648\u0632\u0627\u062a"],
    answer: 2,
    explanation: "\u0627\u0644\u0648\u064a\u062a\u0631 \u0647\u0648 \u0627\u0644\u0645\u0633\u0627\u0639\u062f \u0627\u0644\u0628\u0627\u0634\u0631 \u0644\u0648\u064a\u062a\u0631 \u0627\u0644\u0642\u0633\u0645\u060c \u064a\u0642\u0648\u0645 \u0628\u062c\u0645\u064a\u0639 \u0627\u0644\u0623\u0639\u0645\u0627\u0644 \u0627\u0644\u062a\u064a \u064a\u0642\u0648\u0645 \u0628\u0647\u0627 \u0645\u0646 \u062a\u062c\u0647\u064a\u0632 \u0627\u0644\u0645\u0643\u0627\u0646 \u0648\u0631\u0641\u0639 \u0627\u0644\u0623\u0637\u0628\u0627\u0642 \u0627\u0644\u0641\u0627\u0631\u063a\u0629 \u0648\u0646\u0638\u0627\u0641\u0629 \u0627\u0644\u0637\u0627\u0648\u0644\u0629 \u0648\u062a\u0631\u062a\u064a\u0628\u0647\u0627.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0648\u0638\u0627\u0626\u0641 \u0627\u0644\u0645\u0637\u0639\u0645",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0642\u0627\u0639\u062f\u0629 \u0648\u0636\u0639 \u0627\u0644\u0645\u064a\u0644\u062a\u0648\u0646 \u062a\u062d\u062a \u0627\u0644\u0645\u0641\u0631\u0634\u061f",
    options: ["\u0627\u062e\u062a\u064a\u0627\u0631\u064a \u062d\u0633\u0628 \u0646\u0648\u0639 \u0627\u0644\u0645\u0637\u0639\u0645","\u064a\u0648\u0636\u0639 \u0627\u0644\u0645\u064a\u0644\u062a\u0648\u0646 \u062a\u062d\u062a \u0627\u0644\u0645\u0641\u0631\u0634 \u0648\u0647\u0648 \u0636\u0631\u0648\u0631\u064a \u0644\u0645\u0646\u0639 \u0635\u0648\u062a \u0627\u0644\u0623\u0637\u0628\u0627\u0642 \u0648\u0644\u0643\u064a \u064a\u062d\u0641\u0638 \u0627\u0644\u0645\u0641\u0631\u0634 \u0641\u064a \u0645\u0643\u0627\u0646\u0647","\u064a\u064f\u0633\u062a\u062e\u062f\u0645 \u0627\u0644\u0645\u0641\u0631\u0634 \u0628\u062f\u0648\u0646 \u0645\u064a\u0644\u062a\u0648\u0646 \u0641\u064a \u062c\u0645\u064a\u0639 \u0627\u0644\u062d\u0627\u0644\u0627\u062a","\u0627\u0644\u0645\u064a\u0644\u062a\u0648\u0646 \u064a\u064f\u0648\u0636\u0639 \u0641\u0648\u0642 \u0627\u0644\u0645\u0641\u0631\u0634"],
    answer: 1,
    explanation: "\u064a\u062c\u0628 \u0648\u0636\u0639 \u0645\u064a\u0644\u062a\u0648\u0646 \u062a\u062d\u062a \u0627\u0644\u0645\u0641\u0631\u0634 \u0648\u0647\u0648 \u0636\u0631\u0648\u0631\u064a \u0644\u0645\u0646\u0639 \u0635\u0648\u062a \u0627\u0644\u0623\u0637\u0628\u0627\u0642 \u0648\u0644\u0643\u064a \u064a\u062d\u0641\u0638 \u0627\u0644\u0645\u0641\u0631\u0634 \u0641\u064a \u0645\u0643\u0627\u0646\u0647 \u0639\u0644\u0649 \u0627\u0644\u0637\u0627\u0648\u0644\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u062a\u062c\u0647\u064a\u0632 \u0627\u0644\u0637\u0627\u0648\u0644\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u062a\u0645 \u062a\u063a\u064a\u064a\u0631 \u0627\u0644\u0645\u0641\u0631\u0634 \u0623\u062b\u0646\u0627\u0621 \u0627\u0644\u062e\u062f\u0645\u0629 \u062f\u0648\u0646 \u0625\u0632\u0639\u0627\u062c \u0627\u0644\u0636\u064a\u0641\u061f",
    options: ["\u064a\u064f\u0631\u0641\u0639 \u0627\u0644\u0645\u0641\u0631\u0634 \u0627\u0644\u0642\u062f\u064a\u0645 \u0645\u0628\u0627\u0634\u0631\u0629 \u0623\u0645\u0627\u0645 \u0627\u0644\u0636\u064a\u0648\u0641","\u064a\u064f\u0646\u062a\u0638\u0631 \u062d\u062a\u0649 \u064a\u063a\u0627\u062f\u0631 \u062c\u0645\u064a\u0639 \u0627\u0644\u0636\u064a\u0648\u0641","\u0646\u0636\u0639 \u0627\u0644\u0645\u0641\u0631\u0634 \u0627\u0644\u062c\u062f\u064a\u062f \u0641\u0648\u0642 \u0627\u0644\u0645\u0633\u062a\u0639\u0645\u0644 \u0648\u0646\u0633\u062d\u0628 \u0627\u0644\u0645\u0641\u0631\u0634 \u0627\u0644\u0645\u0633\u062a\u0639\u0645\u0644 \u0628\u0628\u0637\u0621 \u062f\u0648\u0646 \u0623\u0646 \u0646\u0643\u0634\u0641 \u0627\u0644\u0645\u064a\u0644\u062a\u0648\u0646","\u064a\u064f\u063a\u0633\u0644 \u0627\u0644\u0645\u0641\u0631\u0634 \u0623\u0645\u0627\u0645 \u0627\u0644\u0636\u064a\u0648\u0641 \u062b\u0645 \u064a\u064f\u0639\u0627\u062f"],
    answer: 2,
    explanation: "\u0639\u0646\u062f \u062a\u063a\u064a\u064a\u0631 \u0627\u0644\u0645\u0641\u0631\u0634 \u0646\u0636\u0639 \u0627\u0644\u0645\u0641\u0631\u0634 \u0627\u0644\u062c\u062f\u064a\u062f \u0641\u0648\u0642 \u0627\u0644\u0637\u0627\u0648\u0644\u0629 \u062b\u0645 \u0646\u0633\u062d\u0628 \u0627\u0644\u0645\u0641\u0631\u0634 \u0627\u0644\u0645\u0633\u062a\u0639\u0645\u0644 \u0628\u0628\u0637\u0621 \u062f\u0648\u0646 \u0623\u0646 \u0646\u0643\u0634\u0641 \u0627\u0644\u0645\u064a\u0644\u062a\u0648\u0646\u060c \u0648\u0647\u0630\u0627 \u064a\u062a\u0645 \u062f\u0648\u0646 \u0625\u0632\u0639\u0627\u062c \u0627\u0644\u0636\u064a\u0648\u0641.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u062a\u062c\u0647\u064a\u0632 \u0627\u0644\u0637\u0627\u0648\u0644\u0629",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0641\u0636\u064a\u0627\u062a (\u0623\u062f\u0648\u0627\u062a \u0627\u0644\u0637\u0627\u0648\u0644\u0629) \u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629\u061f",
    options: ["\u0634\u0648\u0643\u0629 \u0648\u0633\u0643\u064a\u0646 \u0641\u0642\u0637","\u0645\u0644\u0639\u0642\u0629 \u0634\u0648\u0631\u0628\u0629\u060c \u0633\u0643\u064a\u0646 \u0648\u0634\u0648\u0643\u0629 \u0644\u0644\u0623\u0637\u0628\u0627\u0642 \u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629\u060c \u0634\u0648\u0643\u0629 \u0648\u0645\u0644\u0639\u0642\u0629 \u0644\u0644\u062d\u0644\u0649\u060c \u0633\u0643\u064a\u0646 \u0648\u0634\u0648\u0643\u0629 \u0644\u0644\u0633\u0645\u0643\u060c \u0645\u0644\u0639\u0642\u0629 \u0644\u0644\u0634\u0627\u064a \u0648\u0627\u0644\u0642\u0647\u0648\u0629","\u0623\u0637\u0628\u0627\u0642 \u0648\u0643\u0627\u0633\u0627\u062a \u0641\u0642\u0637","\u0645\u0644\u0627\u0639\u0642 \u0628\u0623\u062d\u062c\u0627\u0645 \u0645\u062e\u062a\u0644\u0641\u0629 \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u0627\u0644\u0641\u0636\u064a\u0627\u062a \u062a\u0634\u0645\u0644: \u0645\u0644\u0639\u0642\u0629 \u0634\u0648\u0631\u0628\u0629\u060c \u0633\u0643\u064a\u0646 \u0648\u0634\u0648\u0643\u0629 \u0643\u0628\u064a\u0631\u0629 \u0644\u0644\u0623\u0637\u0628\u0627\u0642 \u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629\u060c \u0634\u0648\u0643\u0629 \u0648\u0645\u0644\u0639\u0642\u0629 \u0644\u0644\u062d\u0644\u0649\u060c \u0633\u0643\u064a\u0646 \u0648\u0634\u0648\u0643\u0629 \u0644\u0644\u0633\u0645\u0643\u060c \u0645\u0644\u0639\u0642\u0629 \u0644\u0644\u0634\u0627\u064a \u0648\u0627\u0644\u0642\u0647\u0648\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0627\u0644\u0623\u062f\u0648\u0627\u062a",
  },
  {
    q: "\u0623\u064a\u0646 \u062a\u0648\u0636\u0639 \u0627\u0644\u0633\u0643\u0627\u0643\u064a\u0646 \u0627\u0644\u0643\u0628\u064a\u0631\u0629 \u0627\u0644\u062e\u0627\u0635\u0629 \u0628\u0627\u0644\u0644\u062d\u0645 \u0648\u0627\u0644\u0633\u0645\u0643 \u0648\u0627\u0644\u062f\u062c\u0627\u062c \u0639\u0644\u0649 \u0627\u0644\u0637\u0627\u0648\u0644\u0629\u061f",
    options: ["\u0639\u0644\u0649 \u064a\u0633\u0627\u0631 \u0627\u0644\u0636\u064a\u0641 \u062f\u0627\u0626\u0645\u0627\u064b","\u0623\u0645\u0627\u0645 \u0627\u0644\u0636\u064a\u0641 \u0645\u0628\u0627\u0634\u0631\u0629","\u062a\u0648\u0636\u0639 \u062f\u0627\u0626\u0645\u0627\u064b \u064a\u0645\u064a\u0646 \u0627\u0644\u0636\u064a\u0641 \u0645\u0627 \u0639\u062f\u0627 \u0633\u0643\u064a\u0646 \u0627\u0644\u0632\u0628\u062f\u0629 \u062a\u0648\u0636\u0639 \u0639\u0644\u0649 \u064a\u0633\u0627\u0631 \u0641\u0648\u0642 \u0637\u0628\u0642 \u0627\u0644\u062e\u0628\u0632","\u0641\u064a \u0627\u0644\u0645\u0646\u062a\u0635\u0641 \u0623\u0645\u0627\u0645 \u0627\u0644\u0635\u062d\u0646 \u0627\u0644\u0631\u0626\u064a\u0633\u064a"],
    answer: 2,
    explanation: "\u0627\u0644\u0633\u0643\u0627\u0643\u064a\u0646 \u0627\u0644\u0643\u0628\u064a\u0631\u0629 \u0627\u0644\u062e\u0627\u0635\u0629 \u0628\u0627\u0644\u0644\u062d\u0645 \u0648\u0627\u0644\u0633\u0645\u0643 \u0648\u0627\u0644\u062f\u062c\u0627\u062c \u062a\u0648\u0636\u0639 \u062f\u0627\u0626\u0645\u0627\u064b \u064a\u0645\u064a\u0646 \u0627\u0644\u0636\u064a\u0641\u060c \u0623\u0645\u0627 \u0633\u0643\u064a\u0646 \u0627\u0644\u0632\u0628\u062f\u0629 \u0641\u062a\u0648\u0636\u0639 \u0639\u0644\u0649 \u064a\u0633\u0627\u0631 \u0641\u0648\u0642 \u0637\u0628\u0642 \u0627\u0644\u062e\u0628\u0632.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0643\u064a\u0641\u064a\u0629 \u0648\u0636\u0639 \u0627\u0644\u0623\u062f\u0648\u0627\u062a",
  },
  {
    q: "\u0645\u0646 \u0623\u064a \u062c\u0647\u0629 \u064a\u062a\u0645 \u0625\u062e\u0644\u0627\u0621 \u0627\u0644\u0637\u0627\u0648\u0644\u0629 \u0628\u0639\u062f \u0627\u0644\u062e\u062f\u0645\u0629\u061f",
    options: ["\u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0633\u0627\u0631 \u062f\u0627\u0626\u0645\u0627\u064b","\u0645\u0646 \u0623\u064a \u062c\u0647\u0629 \u062d\u0633\u0628 \u0627\u0644\u0645\u0648\u0642\u0641","\u064a\u062a\u0645 \u0627\u0644\u0625\u062e\u0644\u0627\u0621 \u062f\u0627\u0626\u0645\u0627\u064b \u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0645\u064a\u0646","\u0645\u0646 \u0627\u0644\u062c\u0647\u0629 \u0627\u0644\u0623\u0645\u0627\u0645\u064a\u0629 \u0644\u0644\u0636\u064a\u0641"],
    answer: 2,
    explanation: "\u064a\u062a\u0645 \u0627\u0644\u0625\u062e\u0644\u0627\u0621 \u062f\u0627\u0626\u0645\u0627\u064b \u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0645\u064a\u0646\u060c \u0648\u0625\u0646 \u0643\u0627\u0646\u062a \u062a\u0648\u062c\u062f \u062d\u0627\u0644\u0627\u062a \u0627\u0633\u062a\u062b\u0646\u0627\u0626\u064a\u0629 \u0628\u0633\u0628\u0628 \u0648\u062c\u0648\u062f \u0627\u0644\u0636\u064a\u0641 \u0641\u064a \u0645\u0643\u0627\u0646 \u064a\u0635\u0639\u0628 \u0648\u0635\u0648\u0644\u0647 \u0641\u0625\u0646\u0646\u0627 \u0646\u0642\u0648\u0645 \u0628\u0625\u062e\u0644\u0627\u0621 \u0627\u0644\u0637\u0627\u0648\u0644\u0629 \u0645\u0646 \u0623\u064a \u062c\u0647\u0629 \u0623\u062e\u0631\u0649.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0625\u062e\u0644\u0627\u0621 \u0627\u0644\u0637\u0627\u0648\u0644\u0629",
  },
  {
    q: "\u0645\u0627 \u0647\u0648 \u0627\u0644\u062a\u0631\u062a\u064a\u0628 \u0627\u0644\u0635\u062d\u064a\u062d \u0644\u0625\u062e\u0644\u0627\u0621 \u0627\u0644\u0637\u0627\u0648\u0644\u0629 \u0628\u0639\u062f \u0627\u0644\u062e\u062f\u0645\u0629\u061f",
    options: ["\u064a\u064f\u0631\u0641\u0639 \u0643\u0623\u0633 \u0627\u0644\u0645\u0627\u0621 \u0623\u0648\u0644\u0627\u064b \u062b\u0645 \u0628\u0642\u064a\u0629 \u0627\u0644\u0623\u0634\u064a\u0627\u0621","\u064a\u064f\u0631\u0641\u0639 \u0635\u062d\u0646 \u0627\u0644\u0634\u0648\u0631\u0628\u0629 \u2192 \u0635\u062d\u0646 \u0627\u0644\u0633\u0644\u0637\u0629 \u2192 \u0627\u0644\u0635\u062d\u0646 \u0627\u0644\u0631\u0626\u064a\u0633\u064a \u2192 \u0627\u0644\u0645\u0644\u0627\u062d\u0627\u062a \u0648\u0627\u0644\u0643\u0627\u062a\u0634\u0628 \u2192 \u0637\u0628\u0642 \u0627\u0644\u062d\u0644\u0649 \u2192 \u0648\u0623\u062e\u064a\u0631\u0627\u064b \u0643\u0623\u0633 \u0627\u0644\u0645\u0627\u0621","\u064a\u064f\u0631\u0641\u0639 \u0627\u0644\u0635\u062d\u0646 \u0627\u0644\u0631\u0626\u064a\u0633\u064a \u0623\u0648\u0644\u0627\u064b \u062b\u0645 \u0627\u0644\u0628\u0627\u0642\u064a","\u0644\u0627 \u064a\u0648\u062c\u062f \u062a\u0631\u062a\u064a\u0628 \u0645\u062d\u062f\u062f \u0644\u0625\u062e\u0644\u0627\u0621 \u0627\u0644\u0637\u0627\u0648\u0644\u0629"],
    answer: 1,
    explanation: "\u0627\u0644\u062a\u0631\u062a\u064a\u0628 \u0627\u0644\u0635\u062d\u064a\u062d: \u064a\u064f\u0631\u0641\u0639 \u0635\u062d\u0646 \u0627\u0644\u0634\u0648\u0631\u0628\u0629 \u0645\u0639 \u0627\u0644\u0645\u0644\u0639\u0642\u0629\u060c \u062b\u0645 \u0635\u062d\u0646 \u0627\u0644\u0633\u0644\u0637\u0629\u060c \u062b\u0645 \u0627\u0644\u0635\u062d\u0646 \u0627\u0644\u0631\u0626\u064a\u0633\u064a \u0645\u0639 \u0627\u0644\u0641\u0636\u064a\u0627\u062a \u0648\u0635\u062d\u0646 \u0627\u0644\u062e\u0628\u0632 \u0648\u0627\u0644\u0633\u0643\u064a\u0646\u060c \u062b\u0645 \u0627\u0644\u0645\u0644\u0627\u062d\u0627\u062a \u0648\u0627\u0644\u0643\u0627\u062a\u0634\u0628\u060c \u062b\u0645 \u0637\u0628\u0642 \u0627\u0644\u062d\u0644\u0649\u060c \u0648\u0623\u062e\u064a\u0631\u0627\u064b \u0643\u0623\u0633 \u0627\u0644\u0645\u0627\u0621.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u0625\u062e\u0644\u0627\u0621 \u0627\u0644\u0637\u0627\u0648\u0644\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u062a\u0645 \u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0637\u0639\u0627\u0645 \u0644\u0644\u0636\u064a\u0641 \u0628\u0627\u0644\u0637\u0631\u064a\u0642\u0629 \u0627\u0644\u0635\u062d\u064a\u062d\u0629\u061f",
    options: ["\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0627\u0644\u0637\u0628\u0642 \u0627\u0644\u0631\u0626\u064a\u0633\u064a \u0623\u0648\u0644\u0627\u064b \u062b\u0645 \u0627\u0644\u0633\u0644\u0637\u0629","\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0627\u0644\u0645\u0627\u0621 \u0623\u0648\u0644\u0627\u064b \u062b\u0645 \u0637\u0628\u0642 \u0627\u0644\u0633\u0644\u0637\u0629 \u0645\u0646 \u0627\u0644\u064a\u0633\u0627\u0631 \u062b\u0645 \u0627\u0644\u0637\u0628\u0642 \u0627\u0644\u0631\u0626\u064a\u0633\u064a \u0645\u0646 \u0627\u0644\u064a\u0645\u064a\u0646 \u062b\u0645 \u0627\u0644\u062d\u0644\u0649 \u0645\u0646 \u0627\u0644\u064a\u0645\u064a\u0646","\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0627\u0644\u062d\u0644\u0649 \u0623\u0648\u0644\u0627\u064b \u062b\u0645 \u0627\u0644\u0637\u0639\u0627\u0645 \u0627\u0644\u0631\u0626\u064a\u0633\u064a","\u0644\u0627 \u064a\u0648\u062c\u062f \u062a\u0631\u062a\u064a\u0628 \u0645\u062d\u062f\u062f \u0644\u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0637\u0639\u0627\u0645"],
    answer: 1,
    explanation: "\u0639\u0646\u062f \u062c\u0644\u0648\u0633 \u0627\u0644\u0636\u064a\u0641 \u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0644\u0647 \u0627\u0644\u0645\u0627\u0621 \u0623\u0648\u0644\u0627\u064b \u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0645\u064a\u0646\u060c \u062b\u0645 \u0637\u0628\u0642 \u0627\u0644\u0633\u0644\u0637\u0629 \u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0633\u0627\u0631\u060c \u062b\u0645 \u0627\u0644\u0637\u0628\u0642 \u0627\u0644\u0631\u0626\u064a\u0633\u064a \u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0645\u064a\u0646\u060c \u062b\u0645 \u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0627\u0644\u062d\u0644\u0649 \u0645\u0646 \u062c\u0647\u0629 \u0627\u0644\u064a\u0645\u064a\u0646.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644 - \u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0637\u0639\u0627\u0645",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u064f\u062d\u0636\u064e\u0651\u0631 \u0634\u0627\u064a \u0631\u064a\u062d (\u0627\u0644\u0631\u064a\u0628\u0639)\u061f",
    options: ["\u0645\u0644\u0639\u0642\u0629 \u0634\u0627\u064a + \u0643\u0648\u0628 \u0645\u0627\u0621 \u0628\u0627\u0631\u062f \u0645\u0628\u0627\u0634\u0631\u0629","\u0634\u0627\u064a \u0623\u062e\u0636\u0631 \u0645\u0639 \u0646\u0639\u0646\u0627\u0639 \u0637\u0627\u0632\u062c","\u0645\u0644\u0639\u0642\u0629 \u0634\u0627\u064a \u0631\u064a\u0628\u0639 \u062a\u0648\u0636\u0639 \u0641\u064a \u0645\u0627\u0621 \u062f\u0627\u0641\u0626 \u062b\u0645 \u062a\u064f\u0635\u0641\u064e\u0651\u0649 \u0648\u062a\u0648\u0636\u0639 \u0645\u0639 \u0645\u0627\u0621 \u0645\u063a\u0644\u064a \u0639\u0644\u0649 \u0627\u0644\u0646\u0627\u0631 \u062d\u062a\u0649 \u064a\u064f\u0642\u0644\u0628 \u0645\u0639 \u0628\u0639\u0636\u0647 \u0648\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0645\u0639 \u0633\u0643\u0631 \u0628\u0645\u0641\u0631\u062f\u0647","\u0634\u0627\u064a \u0639\u0627\u062f\u064a \u0645\u0639 \u0625\u0636\u0627\u0641\u0629 \u0628\u0643\u062a \u0634\u0627\u064a \u0641\u0642\u0637"],
    answer: 2,
    explanation: "\u0634\u0627\u064a \u0631\u064a\u062d (\u0627\u0644\u0631\u064a\u0628\u0639): \u0645\u0644\u0639\u0642\u0629 \u0634\u0627\u064a \u0631\u064a\u0628\u0639 \u062a\u0648\u0636\u0639 \u0641\u064a \u0645\u0627\u0621 \u062f\u0627\u0641\u0626 \u0648\u064a\u064f\u0635\u0641\u0649 \u0645\u0646 \u0627\u0644\u0645\u0627\u0621 \u0627\u0644\u062f\u0627\u0641\u0626 \u0648\u062a\u0648\u0636\u0639 \u0645\u0639 \u0645\u0627\u0621 \u0645\u063a\u0644\u064a \u0639\u0644\u0649 \u0627\u0644\u0646\u0627\u0631 \u062d\u062a\u0649 \u064a\u064f\u0642\u0644\u0628 \u0645\u0639 \u0628\u0639\u0636\u0647 \u062b\u0645 \u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0645\u0639 \u0633\u0643\u0631 \u0628\u0645\u0641\u0631\u062f\u0647.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b - \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0633\u0627\u062e\u0646\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u064f\u062d\u0636\u064e\u0651\u0631 \u0642\u0647\u0648\u0629 \u062a\u0631\u0643\u064a \u0633\u0627\u062f\u0629\u061f",
    options: ["\u0645\u0644\u0639\u0642\u0629 \u0628\u0646 \u062a\u0631\u0643\u064a + \u0645\u0627\u0621 \u0645\u063a\u0644\u064a \u0645\u0633\u0628\u0642\u0627\u064b \u062a\u064f\u0635\u0628 \u0639\u0644\u064a\u0647","\u0645\u0644\u0639\u0642\u0629 \u0628\u0646 \u062a\u0631\u0643\u064a + \u0645\u0627\u0621 \u0628\u0627\u0631\u062f \u062a\u0648\u0636\u0639 \u0639\u0644\u0649 \u0627\u0644\u0646\u0627\u0631 \u0648\u062a\u064f\u0642\u0644\u064e\u0651\u0628 \u0645\u0631\u0629 \u0648\u0627\u062d\u062f\u0629 \u0648\u064a\u062c\u0628 \u0639\u062f\u0645 \u063a\u0644\u064a\u0627\u0646\u0647\u0627","\u0628\u0646 \u062a\u0631\u0643\u064a \u0645\u0639 \u062d\u0644\u064a\u0628 \u0633\u0627\u062e\u0646 \u0641\u0642\u0637","\u0645\u0644\u0639\u0642\u0629 \u0628\u0646 \u062a\u0631\u0643\u064a + \u0633\u0643\u0631 + \u0645\u0627\u0621 \u062f\u0627\u0641\u0626"],
    answer: 1,
    explanation: "\u0642\u0647\u0648\u0629 \u062a\u0631\u0643\u064a \u0633\u0627\u062f\u0629: \u0645\u0644\u0639\u0642\u0629 \u0628\u0646 \u062a\u0631\u0643\u064a + \u0645\u0627\u0621 \u0628\u0627\u0631\u062f\u060c \u062a\u0648\u0636\u0639 \u0639\u0644\u0649 \u0627\u0644\u0646\u0627\u0631 \u0648\u062a\u064f\u0642\u0644\u064e\u0651\u0628 \u0627\u0644\u0642\u0647\u0648\u0629 \u0645\u0631\u0629 \u0648\u0627\u062d\u062f\u0629 \u0641\u0642\u0637 \u0648\u064a\u062c\u0628 \u0639\u062f\u0645 \u063a\u0644\u064a\u0627\u0646\u0647\u0627.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b - \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0633\u0627\u062e\u0646\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u064f\u062d\u0636\u064e\u0651\u0631 \u0627\u0644\u0643\u0627\u0643\u0627\u0648\u061f",
    options: ["\u0645\u0644\u0639\u0642\u0629 \u0628\u0648\u062f\u0631\u0629 \u0643\u0627\u0643\u0627\u0648 + \u0643\u0648\u0628 \u0645\u0627\u0621 \u0628\u0627\u0631\u062f","\u0645\u0644\u0639\u0642\u0629 \u0628\u0648\u062f\u0631\u0629 \u0627\u0644\u0643\u0627\u0643\u0627\u0648 + \u0643\u0648\u0628 \u0645\u0627\u0621 \u0645\u063a\u0644\u064a\u060c \u064a\u062a\u0645 \u063a\u0644\u064a \u0628\u0648\u062f\u0631\u0629 \u0627\u0644\u0643\u0627\u0643\u0627\u0648 \u0645\u0639 \u0627\u0644\u0645\u0627\u0621 \u0648\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0645\u0639 \u0627\u0644\u062d\u0644\u064a\u0628 \u0628\u0645\u0641\u0631\u062f\u0647","\u0628\u0648\u062f\u0631\u0629 \u0643\u0627\u0643\u0627\u0648 \u062c\u0627\u0647\u0632\u0629 \u062a\u064f\u0630\u0627\u0628 \u0641\u064a \u062d\u0644\u064a\u0628 \u0628\u0627\u0631\u062f","\u0643\u0627\u0643\u0627\u0648 \u062c\u0627\u0647\u0632 \u0645\u0646 \u0627\u0644\u0645\u062a\u062c\u0631 \u0645\u0628\u0627\u0634\u0631\u0629"],
    answer: 1,
    explanation: "\u0627\u0644\u0643\u0627\u0643\u0627\u0648: \u0645\u0644\u0639\u0642\u0629 \u0628\u0648\u062f\u0631\u0629 \u0627\u0644\u0643\u0627\u0643\u0627\u0648 + \u0643\u0648\u0628 \u0645\u0627\u0621 \u0645\u063a\u0644\u064a\u060c \u064a\u062a\u0645 \u063a\u0644\u064a \u0628\u0648\u062f\u0631\u0629 \u0627\u0644\u0643\u0627\u0643\u0627\u0648 \u0645\u0639 \u0627\u0644\u0645\u0627\u0621 \u062b\u0645 \u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0645\u0639 \u0627\u0644\u062d\u0644\u064a\u0628 \u0628\u0645\u0641\u0631\u062f\u0647.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b - \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0633\u0627\u062e\u0646\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u064f\u062d\u0636\u064e\u0651\u0631 \u0627\u0644\u0633\u062d\u0644\u0628\u061f",
    options: ["\u0643\u0648\u0628 \u062d\u0644\u064a\u0628 \u0628\u0627\u0631\u062f \u0645\u0639 \u0628\u0648\u062f\u0631\u0629 \u0633\u062d\u0644\u0628 \u062a\u064f\u0630\u0627\u0628 \u0645\u0628\u0627\u0634\u0631\u0629","\u0643\u0648\u0628 \u062d\u0644\u064a\u0628 \u0645\u063a\u0644\u064a + \u0645\u0644\u0639\u0642\u0629 \u0633\u062d\u0644\u0628 \u0628\u0648\u062f\u0631\u0629\u060c \u064a\u064f\u063a\u0644\u0649 \u0627\u0644\u062d\u0644\u064a\u0628 \u062c\u064a\u062f\u0627\u064b \u062b\u0645 \u062a\u0648\u0636\u0639 \u0628\u0648\u062f\u0631\u0629 \u0627\u0644\u0633\u062d\u0644\u0628 \u0648\u064a\u064f\u0642\u0644\u064e\u0651\u0628 \u0633\u0631\u064a\u0639\u0627\u064b \u062d\u062a\u0649 \u064a\u0635\u0628\u062d \u0633\u0627\u0626\u0644\u0627\u064b \u0645\u062a\u0645\u0627\u0633\u0643\u0627\u064b\u060c \u0648\u064a\u0645\u0643\u0646 \u0648\u0636\u0639 \u0627\u0644\u0642\u0631\u0641\u0629 \u0623\u0648 \u0627\u0644\u0645\u0643\u0633\u0631\u0627\u062a","\u0633\u062d\u0644\u0628 \u062c\u0627\u0647\u0632 \u0645\u0646 \u0627\u0644\u0645\u062a\u062c\u0631 \u0645\u0639 \u0625\u0636\u0627\u0641\u0629 \u062b\u0644\u062c","\u062d\u0644\u064a\u0628 \u0633\u0627\u062e\u0646 \u0628\u062f\u0648\u0646 \u0623\u064a \u0625\u0636\u0627\u0641\u0627\u062a"],
    answer: 1,
    explanation: "\u0627\u0644\u0633\u062d\u0644\u0628: \u0643\u0648\u0628 \u062d\u0644\u064a\u0628 \u0645\u063a\u0644\u064a + \u0645\u0644\u0639\u0642\u0629 \u0633\u062d\u0644\u0628 \u0628\u0648\u062f\u0631\u0629\u060c \u064a\u064f\u063a\u0644\u0649 \u0627\u0644\u062d\u0644\u064a\u0628 \u062c\u064a\u062f\u0627\u064b \u062b\u0645 \u062a\u0648\u0636\u0639 \u0628\u0648\u062f\u0631\u0629 \u0627\u0644\u0633\u062d\u0644\u0628 \u0648\u064a\u064f\u0642\u0644\u064e\u0651\u0628 \u0627\u0644\u0633\u062d\u0644\u0628 \u0633\u0631\u064a\u0639\u0627\u064b \u062d\u062a\u0649 \u064a\u0635\u0628\u062d \u0633\u0627\u0626\u0644\u0627\u064b \u0645\u062a\u0645\u0627\u0633\u0643\u0627\u064b \u0625\u0644\u0649 \u062d\u062f \u0645\u0627\u060c \u0648\u064a\u0645\u0643\u0646 \u0648\u0636\u0639 \u0627\u0644\u0642\u0631\u0641\u0629 \u0623\u0648 \u0627\u0644\u0645\u0643\u0633\u0631\u0627\u062a \u0639\u0646\u062f \u0627\u0644\u062a\u0642\u062f\u064a\u0645.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b - \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0633\u0627\u062e\u0646\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u064f\u062d\u0636\u064e\u0651\u0631 \u0627\u0644\u0642\u0647\u0648\u0629 \u0627\u0644\u0639\u0631\u0628\u064a\u061f",
    options: ["\u0628\u0646 \u0639\u0631\u0628\u064a \u0645\u0639 \u0633\u0643\u0631 \u0648\u062d\u0644\u064a\u0628 \u0645\u063a\u0644\u064a","\u0644\u062a\u0631 \u0645\u0627\u0621 \u0645\u063a\u0644\u064a + \u062b\u0644\u0627\u062b\u0629 \u0641\u0646\u0627\u062c\u064a\u0646 \u0642\u0647\u0648\u0629 \u0639\u0631\u0628\u064a + \u0641\u0646\u062c\u0627\u0646 \u0647\u064a\u0644 \u0645\u0637\u062d\u0648\u0646\u060c \u064a\u0648\u0636\u0639 \u0627\u0644\u0628\u0646 \u0639\u0644\u0649 \u0627\u0644\u0645\u0627\u0621 \u0627\u0644\u0645\u063a\u0644\u064a \u0648\u064a\u062a\u0631\u0643 \u062d\u062a\u0649 \u064a\u0633\u062a\u0648\u064a \u062b\u0645 \u064a\u0648\u0636\u0639 \u0627\u0644\u0647\u064a\u0644 \u0641\u064a \u062f\u0644\u0647 \u0645\u0639 \u0627\u0644\u0642\u0647\u0648\u0629 \u0648\u062a\u064f\u0642\u062f\u064e\u0651\u0645 \u0628\u062f\u0648\u0646 \u0633\u0643\u0631","\u0642\u0647\u0648\u0629 \u0639\u0631\u0628\u064a \u062c\u0627\u0647\u0632\u0629 \u0645\u0646 \u0627\u0644\u0645\u062a\u062c\u0631 \u0645\u0639 \u0627\u0644\u0647\u064a\u0644","\u0628\u0646 \u0639\u0631\u0628\u064a + \u0645\u0627\u0621 \u0628\u0627\u0631\u062f \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u0627\u0644\u0642\u0647\u0648\u0629 \u0627\u0644\u0639\u0631\u0628\u064a\u0629: \u0644\u062a\u0631 \u0645\u0627\u0621 \u0645\u063a\u0644\u064a + \u062b\u0644\u0627\u062b\u0629 \u0641\u0646\u0627\u062c\u064a\u0646 \u0642\u0647\u0648\u0629 \u0639\u0631\u0628\u064a + \u0641\u0646\u062c\u0627\u0646 \u0647\u064a\u0644 \u0645\u0637\u062d\u0648\u0646\u060c \u064a\u0648\u0636\u0639 \u0627\u0644\u0628\u0646 \u0639\u0644\u0649 \u0627\u0644\u0645\u0627\u0621 \u0627\u0644\u0645\u063a\u0644\u064a \u0648\u064a\u064f\u062a\u0631\u0643 \u062d\u062a\u0649 \u064a\u0633\u062a\u0648\u064a \u062b\u0645 \u064a\u064f\u0648\u0636\u0639 \u0627\u0644\u0647\u064a\u0644 \u0627\u0644\u0645\u0637\u062d\u0648\u0646 \u0641\u064a \u062f\u0644\u0647 \u0645\u0639 \u0627\u0644\u0642\u0647\u0648\u0629 \u0648\u062a\u064f\u0642\u062f\u064e\u0651\u0645 \u0628\u062f\u0648\u0646 \u0633\u0643\u0631.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b - \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0633\u0627\u062e\u0646\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u064f\u062d\u0636\u064e\u0651\u0631 \u0639\u0635\u064a\u0631 \u0644\u064a\u0645\u0648\u0646 \u0637\u0627\u0632\u062c (\u0632\u062c\u0627\u062c)\u061f",
    options: ["\u0639\u0635\u064a\u0631 \u0644\u064a\u0645\u0648\u0646 \u062c\u0627\u0647\u0632 \u0645\u0646 \u0627\u0644\u062b\u0644\u0627\u062c\u0629 \u0645\u0639 \u062b\u0644\u062c","\u0643\u0648\u0628 \u0645\u0627\u0621 \u0628\u0627\u0631\u062f + 3 \u0645\u0644\u0627\u0639\u0642 \u0639\u0635\u064a\u0631 \u0644\u064a\u0645\u0648\u0646 + \u0645\u0644\u0639\u0642\u0629 \u0633\u0643\u0631 + \u0642\u0637\u0639 \u0645\u0646 \u0627\u0644\u062b\u0644\u062c\u060c \u064a\u064f\u0630\u0627\u0628 \u0627\u0644\u0633\u0643\u0631 \u0645\u0639 \u0627\u0644\u0645\u0627\u0621 \u0627\u0644\u062f\u0627\u0641\u0626 \u062b\u0645 \u064a\u064f\u0642\u0637\u064e\u0651\u0639 \u0627\u0644\u062b\u0644\u062c \u062b\u0645 \u064a\u064f\u0639\u0635\u064e\u0631 \u0627\u0644\u0644\u064a\u0645\u0648\u0646 \u0648\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0628\u0627\u0631\u062f\u0627\u064b","\u0644\u064a\u0645\u0648\u0646\u0629 \u0648\u0627\u062d\u062f\u0629 \u0645\u0639 \u0643\u0648\u0628 \u0645\u0627\u0621 \u0633\u0627\u062e\u0646","\u0639\u0635\u064a\u0631 \u0644\u064a\u0645\u0648\u0646 \u0645\u0631\u0643\u0651\u0632 \u0645\u0639 \u0645\u0627\u0621 \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u0639\u0635\u064a\u0631 \u0644\u064a\u0645\u0648\u0646 \u0632\u062c\u0627\u062c: \u0643\u0648\u0628 \u0645\u0627\u0621 \u0628\u0627\u0631\u062f + 3 \u0645\u0644\u0627\u0639\u0642 \u0639\u0635\u064a\u0631 \u0644\u064a\u0645\u0648\u0646 + \u0645\u0644\u0639\u0642\u0629 \u0633\u0643\u0631 + \u0642\u0637\u0639 \u0645\u0646 \u0627\u0644\u062b\u0644\u062c\u060c \u064a\u064f\u0648\u0636\u0639 \u0642\u0644\u064a\u0644 \u0645\u0646 \u0627\u0644\u0645\u0627\u0621 \u0627\u0644\u062f\u0627\u0641\u0626 \u0648\u064a\u064f\u0642\u0644\u064e\u0651\u0628 \u062d\u062a\u0649 \u064a\u0630\u0648\u0628 \u0627\u0644\u0633\u0643\u0631 \u062a\u0645\u0627\u0645\u0627\u064b \u062b\u0645 \u064a\u064f\u0648\u0636\u0639 \u0627\u0644\u062b\u0644\u062c \u062b\u0645 \u064a\u064f\u0639\u0635\u064e\u0631 \u0627\u0644\u0644\u064a\u0645\u0648\u0646 \u0648\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0628\u0627\u0631\u062f\u0627\u064b.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b - \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0628\u0627\u0631\u062f\u0629",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0642\u0648\u0627\u0639\u062f \u062e\u062f\u0645\u0629 \u0627\u0644\u0645\u0643\u0627\u062a\u0628\u061f",
    options: ["\u064a\u0645\u0643\u0646 \u0627\u0644\u062f\u062e\u0648\u0644 \u0641\u064a \u0623\u064a \u0648\u0642\u062a \u0628\u062f\u0648\u0646 \u0627\u0633\u062a\u0626\u0630\u0627\u0646","\u0627\u0644\u0627\u0633\u062a\u0626\u0630\u0627\u0646 \u0639\u0646\u062f \u0627\u0644\u062f\u062e\u0648\u0644 \u0648\u0644\u0648 \u0643\u0627\u0646 \u0627\u0644\u0628\u0627\u0628 \u0645\u0641\u062a\u0648\u062d\u0627\u064b\u060c \u0648\u0639\u062f\u0645 \u0627\u0644\u0627\u0646\u0635\u0627\u062a \u0644\u0645\u0627 \u064a\u062f\u0648\u0631 \u0645\u0646 \u0643\u0644\u0627\u0645\u060c \u0648\u0639\u062f\u0645 \u0627\u0644\u062f\u062e\u0648\u0644 \u0623\u062b\u0646\u0627\u0621 \u0645\u0643\u0627\u0644\u0645\u0629 \u0647\u0627\u062a\u0641\u064a\u0629","\u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0628\u062f\u0648\u0646 \u062a\u0646\u0638\u064a\u0645 \u0623\u0648 \u062a\u0631\u062a\u064a\u0628","\u064a\u064f\u0633\u0645\u062d \u0628\u0627\u0644\u062f\u062e\u0648\u0644 \u0644\u0644\u0645\u0643\u062a\u0628 \u062f\u0648\u0646 \u0637\u0631\u0642 \u0625\u0630\u0627 \u0643\u0627\u0646 \u0627\u0644\u0637\u0644\u0628 \u062c\u0627\u0647\u0632\u0627\u064b"],
    answer: 1,
    explanation: "\u0642\u0648\u0627\u0639\u062f \u062e\u062f\u0645\u0629 \u0627\u0644\u0645\u0643\u0627\u062a\u0628: \u0627\u0644\u0627\u0633\u062a\u0626\u0630\u0627\u0646 \u0639\u0646\u062f \u0627\u0644\u062f\u062e\u0648\u0644 \u0628\u0637\u0631\u0642 \u0627\u0644\u0628\u0627\u0628 \u062d\u062a\u0649 \u0648\u0644\u0648 \u0643\u0627\u0646 \u0645\u0641\u062a\u0648\u062d\u0627\u064b\u060c \u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u0637\u0644\u0628\u0627\u062a \u062d\u0633\u0628 \u0646\u0638\u0627\u0645 \u0627\u0644\u0645\u0643\u062a\u0628\u060c \u0627\u0644\u0627\u0646\u062a\u0628\u0627\u0647 \u062c\u064a\u062f\u0627\u064b \u0628\u0627\u0644\u0637\u0644\u0628\u0627\u062a \u0639\u0646\u062f \u0627\u0644\u062f\u062e\u0648\u0644\u060c \u0639\u062f\u0645 \u0627\u0644\u0627\u0646\u0635\u0627\u062a \u0644\u0645\u0627 \u064a\u062f\u0648\u0631 \u0645\u0646 \u0643\u0644\u0627\u0645 \u0648\u0623\u0633\u0631\u0627\u0631\u060c \u0648\u0639\u062f\u0645 \u0627\u0644\u062f\u062e\u0648\u0644 \u0644\u0644\u0645\u0643\u062a\u0628 \u0623\u062b\u0646\u0627\u0621 \u0645\u0643\u0627\u0644\u0645\u0629 \u0647\u0627\u062a\u0641\u064a\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0631\u0627\u0628\u0639 - \u062e\u062f\u0645\u0629 \u0627\u0644\u0645\u0643\u0627\u062a\u0628",
  },
  {
    q: "\u0643\u064a\u0641 \u064a\u062a\u0645 \u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0641\u064a \u0627\u0644\u0645\u0637\u0639\u0645\u061f",
    options: ["\u064a\u064f\u062a\u0631\u0643 \u0627\u0644\u0636\u064a\u0648\u0641 \u064a\u062c\u062f\u0648\u0646 \u0637\u0627\u0648\u0644\u062a\u0647\u0645 \u0628\u0623\u0646\u0641\u0633\u0647\u0645","\u064a\u062a\u0645 \u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0639\u0646 \u0637\u0631\u064a\u0642 \u0645\u062f\u064a\u0631 \u0627\u0644\u0645\u0637\u0639\u0645 \u0628\u0627\u0644\u0627\u0628\u062a\u0633\u0627\u0645\u0629 \u0648\u0627\u0644\u062a\u062d\u064a\u0629 \u0627\u0644\u0645\u0639\u0631\u0648\u0641\u0629 \u062b\u0645 \u0627\u0644\u0633\u0624\u0627\u0644 \u0639\u0646 \u0627\u0644\u062d\u062c\u0632 \u0648\u0639\u062f\u062f \u0627\u0644\u0645\u062c\u0645\u0648\u0639\u0629 \u0645\u0639 \u062a\u0648\u062c\u064a\u0647 \u0627\u0644\u0633\u0624\u0627\u0644 \u0644\u0644\u0636\u064a\u0648\u0641","\u064a\u064f\u0648\u062c\u064e\u0651\u0647 \u0627\u0644\u0636\u064a\u0648\u0641 \u0645\u0628\u0627\u0634\u0631\u0629 \u0644\u0623\u0642\u0631\u0628 \u0637\u0627\u0648\u0644\u0629 \u0628\u062f\u0648\u0646 \u0633\u0624\u0627\u0644","\u064a\u064f\u0633\u062a\u0642\u0628\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0628\u0627\u0644\u0633\u0624\u0627\u0644 \u0639\u0646 \u0647\u0648\u064a\u062a\u0647\u0645 \u0623\u0648\u0644\u0627\u064b"],
    answer: 1,
    explanation: "\u064a\u062a\u0645 \u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0639\u0646 \u0637\u0631\u064a\u0642 \u0645\u062f\u064a\u0631 \u0627\u0644\u0645\u0637\u0639\u0645 \u0628\u0627\u0644\u0627\u0628\u062a\u0633\u0627\u0645\u0629 \u0648\u0627\u0644\u062a\u062d\u064a\u0629 \u0627\u0644\u0645\u0639\u0631\u0648\u0641\u0629\u060c \u062b\u0645 \u064a\u064f\u0633\u0623\u0644 \u0639\u0646 \u0648\u062c\u0648\u062f \u062d\u062c\u0632 \u0645\u0633\u0628\u0642 \u0648\u0643\u0645 \u0639\u062f\u062f \u0627\u0644\u0645\u062c\u0645\u0648\u0639\u0629 \u0645\u0639 \u062a\u0648\u062c\u064a\u0647 \u0627\u0644\u0633\u0624\u0627\u0644 \u0644\u0644\u0636\u064a\u0648\u0641 \u0644\u0644\u062f\u0627\u0639\u064a \u0623\u0646 \u064a\u0643\u0648\u0646 \u0627\u0644\u0645\u0643\u0627\u0646 \u0627\u0644\u0645\u0646\u0627\u0633\u0628 \u0644\u0647\u0645.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062e\u0627\u0645\u0633 - \u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0627\u0644\u0636\u064a\u0648\u0641",
  },
  {
    q: "\u0645\u0627 \u0627\u0644\u0630\u064a \u064a\u062c\u0628 \u0645\u0639\u0631\u0641\u062a\u0647 \u0642\u0628\u0644 \u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628 \u0645\u0646 \u0627\u0644\u0636\u064a\u0641\u061f",
    options: ["\u0627\u0633\u0645 \u0627\u0644\u0636\u064a\u0641 \u0641\u0642\u0637","\u064a\u062c\u0628 \u0645\u0639\u0631\u0641\u0629 \u0627\u0644\u0645\u0648\u062c\u0648\u062f \u0641\u064a \u0642\u0627\u0626\u0645\u0629 \u0627\u0644\u0637\u0639\u0627\u0645 \u0648\u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0648\u063a\u064a\u0631 \u0627\u0644\u0645\u0648\u062c\u0648\u062f \u0648\u062a\u0648\u0636\u064a\u062d \u0630\u0644\u0643 \u0644\u0644\u0636\u064a\u0641 \u0642\u0628\u0644 \u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628","\u0631\u0642\u0645 \u0637\u0627\u0648\u0644\u0629 \u0627\u0644\u0636\u064a\u0641 \u0641\u0642\u0637","\u0639\u062f\u062f \u0627\u0644\u0623\u0634\u062e\u0627\u0635 \u0641\u064a \u0627\u0644\u0645\u062c\u0645\u0648\u0639\u0629 \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u064a\u062c\u0628 \u0645\u0639\u0631\u0641\u0629 \u0627\u0644\u0645\u0648\u062c\u0648\u062f \u0628\u0642\u0627\u0626\u0645\u0629 \u0627\u0644\u0637\u0639\u0627\u0645 \u0648\u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0648\u063a\u064a\u0631 \u0627\u0644\u0645\u0648\u062c\u0648\u062f \u0648\u062a\u0648\u0636\u064a\u062d \u0630\u0644\u0643 \u0644\u0644\u0636\u064a\u0641 \u0642\u0628\u0644 \u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628 \u062b\u0645 \u064a\u064f\u0642\u062a\u0631\u0628 \u0645\u0646\u0647 \u0648\u064a\u064f\u0642\u062f\u064e\u0651\u0645 \u0642\u0627\u0626\u0645\u0629 \u0627\u0644\u0637\u0639\u0627\u0645 \u0644\u0644\u0636\u064a\u0648\u0641 \u0645\u0639 \u0627\u0644\u062a\u062d\u064a\u0629 \u0648\u0627\u0644\u0627\u0628\u062a\u0633\u0627\u0645\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062e\u0627\u0645\u0633 - \u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628\u0627\u062a",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0628\u064a\u0636 \u0645\u0646 \u0646\u0627\u062d\u064a\u0629 \u0627\u0644\u0637\u0647\u064a\u061f",
    options: ["\u0628\u064a\u0636 \u0645\u0642\u0644\u064a \u0648\u0628\u064a\u0636 \u0645\u0633\u0644\u0648\u0642 \u0641\u0642\u0637","\u0628\u064a\u0636 \u0639\u064a\u0648\u0646\u060c \u0628\u064a\u0636 \u0645\u0633\u0644\u0648\u0642\u060c \u0628\u064a\u0636 \u0628\u0627\u0644\u062c\u0628\u0646 \u0627\u0644\u0645\u0628\u0634\u0648\u0631\u060c \u0628\u064a\u0636 \u0628\u062c\u0628\u0646 \u0643\u0627\u0633\u0627\u062a\u060c \u0628\u064a\u0636 \u0645\u0637\u062d\u0646\u060c \u0634\u0643\u0634\u0648\u0643\u0629","\u0628\u064a\u0636 \u0645\u062e\u0641\u0648\u0642 \u0641\u0642\u0637","\u0628\u064a\u0636 \u0639\u064a\u0648\u0646 \u0648\u0634\u0643\u0634\u0648\u0643\u0629 \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0628\u064a\u0636 \u0627\u0644\u062a\u064a \u062a\u064f\u0642\u062f\u064e\u0651\u0645 \u062a\u0634\u0645\u0644: \u0628\u064a\u0636 \u0639\u064a\u0648\u0646\u060c \u0628\u064a\u0636 \u0645\u0633\u0644\u0648\u0642\u060c \u0628\u064a\u0636 \u0628\u0627\u0644\u062c\u0628\u0646 \u0627\u0644\u0645\u0628\u0634\u0648\u0631\u060c \u0628\u064a\u0636 \u0628\u062c\u0628\u0646 \u0643\u0627\u0633\u0627\u062a\u060c \u0628\u064a\u0636 \u0645\u0637\u062d\u0646\u060c \u0648\u0634\u0643\u0634\u0648\u0643\u0629.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0646\u064a - \u0627\u0644\u0623\u0637\u0639\u0645\u0629",
  },
  {
    q: "\u0643\u064a\u0641 \u062a\u064f\u062d\u0636\u064e\u0651\u0631 \u0627\u0644\u0634\u0643\u0634\u0648\u0643\u0629\u061f",
    options: ["\u0628\u064a\u0636 \u0645\u0633\u0644\u0648\u0642 \u0645\u0639 \u0635\u0644\u0635\u0629 \u0637\u0645\u0627\u0637\u0645","\u0636\u0639 \u0645\u0642\u0644\u0649 \u0641\u0648\u0642 \u0627\u0644\u0646\u0627\u0631 \u0628\u0647\u0627 \u0645\u0627\u062f\u0629 \u062f\u0647\u0646\u064a\u0629 \u062b\u0645 \u0642\u0637\u0639 \u0627\u0644\u0628\u0635\u0644 \u0627\u0644\u0635\u063a\u064a\u0631\u0629\u060c \u062b\u0645 \u0627\u0644\u0637\u0645\u0627\u0637\u0645 \u0648\u0627\u0644\u0628\u0642\u062f\u0648\u0646\u0633 \u0648\u0627\u0644\u062b\u0648\u0645\u060c \u062b\u0645 \u0627\u0644\u0628\u064a\u0636 \u0645\u062e\u0641\u0648\u0642\u0627\u064b \u0623\u0648 \u0639\u064a\u0648\u0646\u0627\u064b \u062d\u0633\u0628 \u0627\u0644\u0637\u0644\u0628","\u0628\u064a\u0636 \u0645\u0642\u0644\u064a \u0641\u0642\u0637 \u0645\u0639 \u0627\u0644\u0645\u0644\u062d \u0648\u0627\u0644\u0641\u0644\u0641\u0644","\u0637\u0645\u0627\u0637\u0645 \u0645\u0639 \u0628\u064a\u0636 \u0645\u0633\u0644\u0648\u0642 \u0648\u0632\u064a\u062a\u0648\u0646"],
    answer: 1,
    explanation: "\u0627\u0644\u0634\u0643\u0634\u0648\u0643\u0629: \u0636\u0639 \u0645\u0642\u0644\u0649 \u0641\u0648\u0642 \u0627\u0644\u0646\u0627\u0631 \u0628\u0647\u0627 \u0645\u0627\u062f\u0629 \u062f\u0647\u0646\u064a\u0629\u060c \u0646\u0642\u0648\u0645 \u0628\u0648\u0636\u0639 \u0642\u0637\u0639 \u0627\u0644\u0628\u0635\u0644 \u0635\u063a\u064a\u0631\u0629 \u0641\u064a \u0627\u0644\u0645\u0642\u0644\u0649 \u0648\u0646\u062a\u0631\u0643\u0647\u0627 \u062d\u062a\u0649 \u064a\u062a\u063a\u064a\u0631 \u0644\u0648\u0646 \u0627\u0644\u0628\u0635\u0644 \u0625\u0644\u0649 \u0630\u0647\u0628\u064a\u060c \u0641\u0646\u0636\u0639 \u0627\u0644\u0637\u0645\u0627\u0637\u0645 \u0635\u063a\u064a\u0631\u0629 \u0648\u0627\u0644\u0628\u0642\u062f\u0648\u0646\u0633 \u0627\u0644\u0645\u0641\u0631\u0648\u0645 \u0648\u0642\u0644\u064a\u0644 \u0645\u0646 \u0627\u0644\u062b\u0648\u0645\u060c \u062b\u0645 \u0646\u0636\u0639 \u0627\u0644\u0628\u064a\u0636 \u0645\u062e\u0641\u0648\u0642\u0627\u064b \u0623\u0648 \u0639\u064a\u0648\u0646\u0627\u064b \u062d\u0633\u0628 \u0627\u0644\u0637\u0644\u0628.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0646\u064a - \u0627\u0644\u0623\u0637\u0639\u0645\u0629",
  },
  {
    q: "\u0645\u0627 \u0647\u064a \u0641\u0648\u0627\u0626\u062f \u0627\u0644\u0633\u0644\u0637\u0629 \u0627\u0644\u063a\u0630\u0627\u0626\u064a\u0629\u061f",
    options: ["\u0644\u064a\u0633 \u0644\u0647\u0627 \u0623\u064a \u0641\u0627\u0626\u062f\u0629 \u063a\u0630\u0627\u0626\u064a\u0629 \u0648\u062a\u064f\u0642\u062f\u064e\u0651\u0645 \u0644\u0644\u062a\u0632\u064a\u064a\u0646 \u0641\u0642\u0637","\u062a\u064f\u0642\u062f\u064e\u0651\u0645 \u0643\u0648\u062c\u0628\u0629 \u0631\u0626\u064a\u0633\u064a\u0629 \u0641\u0642\u0637","\u0623\u0635\u0628\u062d\u062a \u0627\u0644\u0633\u0644\u0637\u0629 \u0623\u0643\u062b\u0631 \u0634\u064a\u0648\u0639\u0627\u064b \u0644\u0623\u0646 \u0627\u0644\u0646\u0627\u0633 \u062a\u0639\u0631\u0641\u0648\u0627 \u0639\u0644\u0649 \u0642\u064a\u0645\u062a\u0647\u0627 \u0627\u0644\u063a\u0630\u0627\u0626\u064a\u0629 \u0641\u0647\u064a \u062a\u062d\u062a\u0648\u064a \u0639\u0644\u0649 \u0641\u064a\u062a\u0627\u0645\u064a\u0646\u0627\u062a \u0648\u0623\u0645\u0644\u0627\u062d \u0639\u0627\u0644\u064a\u0629","\u0627\u0644\u0633\u0644\u0637\u0629 \u062a\u062d\u062a\u0648\u064a \u0639\u0644\u0649 \u0628\u0631\u0648\u062a\u064a\u0646\u0627\u062a \u0641\u0642\u0637"],
    answer: 2,
    explanation: "\u0644\u0642\u062f \u0623\u0635\u0628\u062d\u062a \u0627\u0644\u0633\u0644\u0637\u0629 \u0623\u0643\u062b\u0631 \u0634\u064a\u0648\u0639\u0627\u064b \u0648\u0630\u0644\u0643 \u0644\u0645\u0639\u0631\u0641\u0629 \u0627\u0644\u0646\u0627\u0633 \u0628\u0642\u064a\u0645\u062a\u0647\u0627 \u0627\u0644\u063a\u0630\u0627\u0626\u064a\u0629 \u0627\u0644\u062a\u064a \u062a\u062d\u062a\u0648\u064a \u0639\u0644\u0649 \u0641\u064a\u062a\u0627\u0645\u064a\u0646\u0627\u062a \u0648\u0623\u0645\u0644\u0627\u062d \u0639\u0627\u0644\u064a\u0629.",

  {

    answer: 2,
    explanation: "\u0634\u0631\u0648\u0637 \u0625\u0646\u0634\u0627\u0621 \u0645\u0637\u0628\u062e \u0635\u062d\u064a: \u0623\u0646 \u064a\u0643\u0648\u0646 \u0641\u0633\u064a\u062d\u0627\u064b \u062d\u0633\u0628 \u0639\u062f\u062f \u0627\u0644\u0623\u0641\u0631\u0627\u062f \u0627\u0644\u0639\u0627\u0645\u0644\u064a\u0646 \u0641\u064a\u0647 \u0648\u0643\u0645\u064a\u0629 \u0627\u0644\u0648\u062c\u0628\u0627\u062a \u0627\u0644\u0645\u0637\u0644\u0648\u0628 \u0625\u0639\u062f\u0627\u062f\u0647\u0627\u060c \u0648\u062c\u0648\u062f \u062a\u0644\u0627\u062c\u0627\u062a\u060c \u0648\u062c\u0648\u062f \u0623\u062c\u0647\u0632\u0629 \u0645\u0627\u0621 \u0633\u0627\u062e\u0646\u0629 \u0648\u0628\u0627\u0631\u062f\u0629 \u0648\u0643\u0645\u064a\u0627\u062a \u0627\u0644\u0623\u0637\u0639\u0645\u0629 \u0627\u0644\u0645\u062e\u062a\u0644\u0641\u0629 \u0628\u0627\u0631\u062f\u0627\u064b \u0623\u0648 \u0645\u062c\u0645\u062f\u0627\u064b.",
    chapter: "\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0646\u064a - \u0627\u0644\u0645\u0637\u0628\u062e",
  },
  {
    q: "\u0645\u0627 \u0647\u0648 \u0627\u0644\u062a\u0639\u0627\u0648\u0646 \u0648\u0623\u0647\u0645\u064a\u062a\u0647 \u0623\u062b\u0646\u0627\u0621 \u0627\u0644\u062e\u062f\u0645\u0629\u061f",
    options: ["\u0627\u0644\u062a\u0639\u0627\u0648\u0646 \u063a\u064a\u0631 \u0645\u0647\u0645 \u0641\u064a \u0627\u0644\u0639\u0645\u0644 \u0648\u0643\u0644 \u0645\u0648\u0638\u0641 \u064a\u0639\u0645\u0644 \u0628\u0645\u0641\u0631\u062f\u0647","\u0627\u0644\u062a\u0639\u0627\u0648\u0646 \u0645\u0646 \u0639\u0648\u0627\u0645\u0644 \u0646\u062c\u0627\u062d \u0627\u0644\u0645\u0637\u0639\u0645\u060c \u0648\u064a\u062c\u0628 \u0623\u0646 \u064a\u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628 \u0645\u0646 \u0627\u0644\u0636\u064a\u0641 \u0628\u062a\u0631\u062a\u064a\u0628 \u0645\u0639 \u0645\u0631\u0627\u0639\u0627\u0629 \u062a\u0631\u062a\u064a\u0628 \u062d\u0636\u0648\u0631 \u0627\u0644\u0636\u064a\u0641 \u0639\u0646\u062f \u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628","\u0627\u0644\u062a\u0639\u0627\u0648\u0646 \u064a\u064f\u0624\u062e\u0631 \u062a\u0642\u062f\u064a\u0645 \u0627\u0644\u062e\u062f\u0645\u0629","\u064a\u0643\u0641\u064a \u0623\u0646 \u064a\u0639\u0645\u0644 \u0645\u0633\u0624\u0648\u0644 \u0627\u0644\u062e\u062f\u0645\u0629 \u0641\u0642\u0637"],
    answer: 1,
    explanation: "\u0627\u0644\u062a\u0639\u0627\u0648\u0646 \u0645\u0646 \u0639\u0648\u0627\u0645\u0644 \u0646\u062c\u0627\u062d \u0627\u0644\u0645\u0637\u0639\u0645\u061b \u064a\u062c\u0628 \u0623\u0646 \u064a\u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628 \u0645\u0646 \u0627\u0644\u0636\u064a\u0641 \u0628\u062a\u0631\u062a\u064a\u0628 \u0648\u064a\u0631\u0627\u0639\u064a \u062a\u0631\u062a\u064a\u0628 \u062d\u0636\u0648\u0631 \u0627\u0644\u0636\u064a\u0641 \u0639\u0646\u062f \u062d\u0636\u0648\u0631 \u0623\u0643\u062b\u0631 \u0645\u0646 \u0636\u064a\u0641 \u0641\u064a \u0648\u0642\u062a \u0648\u0627\u062d\u062f\u060c \u0648\u0639\u0646\u062f \u062a\u0642\u062f\u064a\u0645 \u062e\u062f\u0645\u0629 \u0639\u0644\u0649 \u0637\u0627\u0648\u0644\u062a\u064a\u0646 \u0645\u062e\u062a\u0644\u0641\u062a\u064a\u0646 \u064a\u062c\u0628 \u0623\u0646 \u064a\u062a\u0635\u0631\u0641 \u0628\u0644\u0628\u0627\u0642\u0629 \u0648\u0623\u062f\u0628.",

const C = {
  primary:"#1a1a2e", secondary:"#16213e", accent:"#0f3460",
  gold:"#e2b96f", goldLight:"#f5d89c", correct:"#22c55e",
  wrong:"#ef4444", white:"#ffffff", gray:"#94a3b8", cardBg:"#1e2a45",
};

function App() {
  const [screen, setScreen] = useState("home");
  const [currentQ, setCurrentQ] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [wrongAnswers, setWrongAnswers] = useState([]);
  const [shuffled, setShuffled] = useState([]);
  const [timer, setTimer] = useState(0);
  const [timerActive, setTimerActive] = useState(false);

  useEffect(() => {
    setShuffled([...questions].sort(() => Math.random() - 0.5));
  }, []);

  useEffect(() => {
    let iv;
    if (timerActive) iv = setInterval(() => setTimer(t => t + 1), 1000);
    return () => clearInterval(iv);
  }, [timerActive]);

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const startQuiz = () => {
    const arr = [...questions].sort(() => Math.random() - 0.5);
    setShuffled(arr);
    setCurrentQ(0); setScore(0); setWrongAnswers([]);
    setSelected(null); setAnswered(false);
    setTimer(0); setTimerActive(true);
    setScreen("quiz");
  };

  const handleSelect = (idx) => {
    if (answered) return;
    setSelected(idx); setAnswered(true);
    const q = shuffled[currentQ];
    if (idx === q.answer) setScore(s => s + 1);
    else setWrongAnswers(w => [...w, {...q, yourAnswer: idx}]);
  };

  const handleNext = () => {
    if (currentQ + 1 >= shuffled.length) { setTimerActive(false); setScreen("result"); }
    else { setCurrentQ(c => c + 1); setSelected(null); setAnswered(false); }
  };

  const q = shuffled[currentQ];
  const progress = shuffled.length > 0 ? ((currentQ + 1) / shuffled.length) * 100 : 0;
  const pct = shuffled.length > 0 ? Math.round((score / shuffled.length) * 100) : 0;
  const labels = ["\u0623","\u0628","\u062c","\u062f"];

  const badge = pct >= 90 ? {icon:"\ud83c\udfc6", label:"\u0645\u0645\u062a\u0627\u0632", color:C.gold}
    : pct >= 75 ? {icon:"\ud83e\udd47", label:"\u062c\u064a\u062f \u062c\u062f\u0627\u064b", color:"#60a5fa"}
    : pct >= 60 ? {icon:"\ud83c\udfaf", label:"\u062c\u064a\u062f", color:"#a78bfa"}
    : {icon:"\ud83d\udcda", label:"\u062a\u062d\u062a\u0627\u062c \u0645\u0631\u0627\u062c\u0639\u0629", color:"#f87171"};

  const root = {minHeight:"100vh", background:`linear-gradient(135deg,${C.primary} 0%,${C.secondary} 50%,${C.accent} 100%)`, direction:"rtl", padding:"0", margin:"0"};
  const wrap = {maxWidth:"520px", margin:"0 auto", padding:"16px", minHeight:"100vh", display:"flex", flexDirection:"column"};

  if (screen === "home") return (
    <div style={root}><div style={wrap}>
      <div style={{flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:"20px", paddingTop:"20px"}}>
        <div style={{background:`linear-gradient(135deg,${C.gold},${C.goldLight})`, borderRadius:"24px", padding:"32px 24px", textAlign:"center", boxShadow:"0 20px 60px rgba(226,185,111,0.3)"}}>
          <div style={{fontSize:"56px", marginBottom:"12px"}}>\ud83c\udf93</div>
          <h1 style={{color:C.primary, fontSize:"21px", fontWeight:"800", margin:"0 0 8px"}}>\u0627\u0644\u0645\u0639\u0644\u0648\u0645\u0627\u062a \u0627\u0644\u0623\u0633\u0627\u0633\u064a\u0629 \u0644\u0644\u0645\u0636\u064a\u0641</h1>
          <p style={{color:C.accent, fontSize:"14px", margin:"0", opacity:0.85}}>\u062f\u0648\u0631\u0629 \u0637\u0647\u064a \u062a\u0623\u0633\u064a\u0633\u064a\u0629</p>
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"12px"}}>
          {[{icon:"\u2753",label:"\u0633\u0624\u0627\u0644",value:questions.length},{icon:"\ud83d\udcda",label:"\u0641\u0635\u0648\u0644",value:"5"},{icon:"\u23f1\ufe0f",label:"\u0645\u0624\u0642\u062a",value:"\u0646\u0639\u0645"}].map((s,i) => (
            <div key={i} style={{background:C.cardBg, borderRadius:"16px", padding:"14px 8px", textAlign:"center", border:"1px solid rgba(226,185,111,0.2)"}}>
              <div style={{fontSize:"22px"}}>{s.icon}</div>
              <div style={{color:C.gold, fontSize:"18px", fontWeight:"700"}}>{s.value}</div>
              <div style={{color:C.gray, fontSize:"11px"}}>{s.label}</div>
            </div>
          ))}
        </div>
        <div style={{background:C.cardBg, borderRadius:"16px", padding:"16px", border:"1px solid rgba(226,185,111,0.15)"}}>
          <h3 style={{color:C.gold, margin:"0 0 12px", fontSize:"14px"}}>\ud83d\udcd6 \u0627\u0644\u0645\u062d\u062a\u0648\u0649 \u0627\u0644\u0645\u064f\u063a\u0637\u064e\u0651\u0649</h3>
          {["\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0623\u0648\u0644: \u0627\u0644\u0645\u0636\u064a\u0641 \u0648\u062a\u062c\u0647\u064a\u0632 \u0627\u0644\u0637\u0627\u0648\u0644\u0629","\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0646\u064a: \u0627\u0644\u0645\u0637\u0628\u062e \u0648\u0627\u0644\u0623\u0637\u0639\u0645\u0629 \u0648\u0627\u0644\u0633\u0644\u0637\u0629","\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062b\u0627\u0644\u062b: \u0627\u0644\u0645\u0634\u0631\u0648\u0628\u0627\u062a \u0627\u0644\u0633\u0627\u062e\u0646\u0629 \u0648\u0627\u0644\u0628\u0627\u0631\u062f\u0629","\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u0631\u0627\u0628\u0639: \u062e\u062f\u0645\u0629 \u0627\u0644\u0645\u0643\u0627\u062a\u0628","\u0627\u0644\u0641\u0635\u0644 \u0627\u0644\u062e\u0627\u0645\u0633: \u0627\u0633\u062a\u0642\u0628\u0627\u0644 \u0627\u0644\u0636\u064a\u0648\u0641 \u0648\u0623\u062e\u0630 \u0627\u0644\u0637\u0644\u0628\u0627\u062a"].map((c,i) => (
            <div key={i} style={{display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px"}}>
              <div style={{width:"6px", height:"6px", borderRadius:"50%", background:C.gold, flexShrink:0}}/>
              <span style={{color:C.white, fontSize:"13px", opacity:0.85}}>{c}</span>
            </div>
          ))}
        </div>
        <button onClick={startQuiz} style={{background:`linear-gradient(135deg,${C.gold},${C.goldLight})`, color:C.primary, border:"none", borderRadius:"16px", padding:"18px", fontSize:"18px", fontWeight:"800", cursor:"pointer", boxShadow:"0 8px 30px rgba(226,185,111,0.4)"}}>
          \ud83d\ude80 \u0627\u0628\u062f\u0623 \u0627\u0644\u0627\u062e\u062a\u0628\u0627\u0631 \u0627\u0644\u0622\u0646
        </button>
      </div>
    </div></div>
  );

  if (screen === "result") return (
    <div style={root}><div style={wrap}>
      <div style={{flex:1, display:"flex", flexDirection:"column", gap:"16px", paddingTop:"20px", paddingBottom:"24px"}}>
        <div style={{background:`linear-gradient(135deg,${C.cardBg},${C.accent})`, borderRadius:"24px", padding:"28px", textAlign:"center", border:`2px solid ${badge.color}`, boxShadow:`0 0 30px ${badge.color}40`}}>
          <div style={{fontSize:"52px", marginBottom:"8px"}}>{badge.icon}</div>
          <div style={{color:badge.color, fontSize:"20px", fontWeight:"800", marginBottom:"4px"}}>{badge.label}</div>
          <div style={{fontSize:"52px", fontWeight:"900", background:`linear-gradient(135deg,${C.gold},${C.goldLight})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>{pct}%</div>
          <div style={{color:C.gray, fontSize:"15px"}}>{score} / {shuffled.length} \u0625\u062c\u0627\u0628\u0629 \u0635\u062d\u064a\u062d\u0629</div>
          <div style={{color:C.gray, fontSize:"13px", marginTop:"6px"}}>\u23f1\ufe0f \u0627\u0644\u0648\u0642\u062a:
